apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root
  namespace: argocd
spec:
  goTemplate: true

  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/scepion1d/homelab-iac.git
              revision: main
              pathParamPrefix: globals
              files:
                - path: cluster/globals.yaml
          - git:
              repoURL: https://github.com/scepion1d/homelab-iac.git
              revision: main
              files:
                - path: cluster/apps/*/_appset.yaml

  template:
    metadata:
      name: '{{ .path.basename }}'
      annotations:
        homelab.iac/revision: '{{ default 1 .revision }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io/foreground
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  templatePatch: |
    spec:
      source:
        {{- $rev := default 1 .revision }}
        {{- if hasKey . "source" }}
        {{- /* Explicit source from _appset.yaml (Helm chart). */}}
        {{- $src := .source }}
        {{- if hasKey . "ingressHost" }}
        {{- $url := printf "https://%s.%s" .ingressHost .lanDomain }}
        {{- $param := dict "name" .ingressHelmParam "value" $url }}
        {{- $overlay := dict "helm" (dict "parameters" (list $param)) }}
        {{- $src = mergeOverwrite (deepCopy $src) $overlay }}
        {{- end }}
        {{- /* Cache-bust: append revision marker as a YAML comment to helm.values. */}}
        {{- /* `helm.values` may be a string (literal block) or a map — Argo CD */}}
        {{- /* itself only accepts a string here, so we render maps via toYaml. */}}
        {{- $oldValues := "" }}
        {{- if and (hasKey $src "helm") (hasKey $src.helm "values") }}
          {{- if kindIs "string" $src.helm.values }}
            {{- $oldValues = $src.helm.values }}
          {{- else }}
            {{- $oldValues = toYaml $src.helm.values }}
          {{- end }}
        {{- end }}
        {{- $newValues := printf "%s\n# homelab-revision: %v\n" $oldValues $rev }}
        {{- $src = mergeOverwrite (deepCopy $src) (dict "helm" (dict "values" $newValues)) }}
        {{- toYaml $src | nindent 8 }}
        {{- else }}
        repoURL: {{ .repoUrl }}
        targetRevision: main
        path: '{{ .path.path }}'
        kustomize:
          commonAnnotations:
            homelab.iac/revision: "{{ $rev }}"
          {{- if hasKey . "ingressHost" }}
          {{- /* Two hostnames per ingressHost:                                 */}}
          {{- /*   $host    = <ingressHost>.<lanDomain>          (MikroTik DNS) */}}
          {{- /*   $nipHost = <ingressHost>.<hostIp-dashed>.nip.io (DNS bypass) */}}
          {{- /* Both go into server-alias (comma-separated; nginx splits)     */}}
          {{- /* and both get appended to spec.tls[0].hosts so cert-manager    */}}
          {{- /* requests a leaf cert covering both SANs. Lets a device that   */}}
          {{- /* doesn't use AdGuard DNS (guest, cellular) still reach the     */}}
          {{- /* homelab on-LAN via the nip.io URL with valid TLS.             */}}
          {{- $host := printf "%s.%s" .ingressHost .lanDomain }}
          {{- $hostIpDashed := replace "." "-" .hostIp }}
          {{- $nipHost := printf "%s.%s.nip.io" .ingressHost $hostIpDashed }}
          {{- $aliases := printf "%s,%s" $host $nipHost }}
          patches:
            - target:
                kind: Ingress
              patch: |-
                - op: add
                  path: /metadata/annotations/nginx.ingress.kubernetes.io~1server-alias
                  value: "{{ $aliases }}"
                - op: add
                  path: /spec/tls/0/hosts/-
                  value: "{{ $host }}"
                - op: add
                  path: /spec/tls/0/hosts/-
                  value: "{{ $nipHost }}"
          {{- end }}
        {{- end }}
