apiVersion: v1
kind: Service
metadata:
  name: adguard-exporter
  namespace: dns
  labels:
    app.kubernetes.io/name: adguard-exporter
  # Picked up by the Prometheus chart's `kubernetes-service-endpoints` scrape job.
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9617"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: adguard-exporter
  ports:
    - name: metrics
      port: 9617
      targetPort: metrics
