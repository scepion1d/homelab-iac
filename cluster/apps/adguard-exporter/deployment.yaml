apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-exporter
  namespace: dns
  labels:
    app.kubernetes.io/name: adguard-exporter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguard-exporter
    spec:
      containers:
        - name: adguard-exporter
          image: ghcr.io/znandev/adguardexporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9617
          env:
            - name: ADGUARD_HOST
              # In-cluster URL of the AdGuard UI service.
              value: "http://adguard-ui.dns.svc.cluster.local:80"
            - name: EXPORTER_PORT
              value: "9617"
            - name: SCRAPE_INTERVAL
              value: "30s"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ADGUARD_USER
              valueFrom:
                secretKeyRef:
                  name: adguard-credentials
                  key: username
            - name: ADGUARD_PASS
              valueFrom:
                secretKeyRef:
                  name: adguard-credentials
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
