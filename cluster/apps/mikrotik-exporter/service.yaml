apiVersion: v1
kind: Service
metadata:
  name: mikrotik-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mikrotik-exporter
  # Picked up by the chart's `kubernetes-service-endpoints` scrape job.
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "49090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mikrotik-exporter
  ports:
    - name: metrics
      port: 49090
      targetPort: metrics
