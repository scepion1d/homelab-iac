apiVersion: apps/v1
kind: Deployment
metadata:
  name: mikrotik-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mikrotik-exporter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mikrotik-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mikrotik-exporter
    spec:
      containers:
        - name: mktxp
          image: ghcr.io/akpw/mktxp:1.2.17
          imagePullPolicy: IfNotPresent
          # --cfg-dir tells mktxp where to find mktxp.conf and
          # _mktxp.conf. The credentials.yaml referenced from
          # mktxp.conf is mounted alongside at the same path.
          # NOTE: the image has no ENTRYPOINT (CMD is ["mktxp","export"]),
          # so we must specify `command` here, otherwise `args` alone is
          # treated as the executable.
          command: ["mktxp"]
          args: ["--cfg-dir", "/etc/mktxp", "export"]
          ports:
            - name: metrics
              containerPort: 49090
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/mktxp/mktxp.conf
              subPath: mktxp.conf
              readOnly: true
            - name: config
              mountPath: /etc/mktxp/_mktxp.conf
              subPath: _mktxp.conf
              readOnly: true
            - name: credentials
              mountPath: /etc/mktxp/credentials.yaml
              subPath: credentials.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: mikrotik-exporter
        - name: credentials
          secret:
            # Create out-of-band — see README.md in this folder.
            # Pod will CrashLoopBackOff until the Secret exists.
            secretName: mikrotik-exporter-credentials
