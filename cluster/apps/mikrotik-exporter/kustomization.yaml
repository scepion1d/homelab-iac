# mktxp — MikroTik RouterOS API Prometheus exporter.
#
# Replaces snmp-exporter for the home router because mktxp exposes
# richer data the SNMP MIB doesn't have: per-DHCP-lease records, per
# wireless client signal, queue stats, firewall counters, etc.
#
# Talks RouterOS API on port 8728. You must create a dedicated user
# on the router first (see README in this folder).
#
# Credentials live in a Secret you create out-of-band — see README.
# This kustomize app only ships the deployment + service + config
# knobs; the secret is not in git.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
