apiVersion: v1
kind: ConfigMap
metadata:
  name: mikrotik-exporter
  namespace: monitoring
data:
  _mktxp.conf: |
    [MKTXP]
        listen = '0.0.0.0:49090'
        socket_timeout = 5

        initial_delay_on_failure = 30
        max_delay_on_failure = 300
        delay_inc_div = 5

        bandwidth = False
        bandwidth_test_dns_server = 8.8.8.8
        bandwidth_test_interval = 600
        minimal_collect_interval = 5

        verbose_mode = False
        fetch_routers_in_parallel = False
        max_worker_threads = 5
        max_scrape_duration = 10
        total_max_scrape_duration = 30
        persistent_router_connection_pool = True
        persistent_dhcp_cache = True
        compact_default_conf_values = False
        prometheus_headers_deduplication = False

        # mktxp 1.2.17 added these for the /probe multi-target endpoint.
        # We don't use /probe but the keys still need to be present.
        probe_connection_pool = False
        probe_connection_pool_ttl = 300
        probe_connection_pool_max_size = 128

        # mktxp 1.2.17 also added this for the metrics HTTP server.
        http_server_threads = 5
  mktxp.conf: |
    [default]
        enabled = True
        module_only = False
        hostname = localhost
        port = 8728
        username = username
        password = password
        credentials_file = ""
        custom_labels = None

        use_ssl = False
        no_ssl_certificate = False
        ssl_certificate_verify = False
        ssl_check_hostname = True
        ssl_ca_file = ""
        plaintext_login = True

        routerboard = False
        health = True
        installed_packages = True
        dhcp = True
        dhcp_lease = True

        connections = True
        connection_stats = False
        connection_stats_destinations = False

        interface = True
        wireguard_peers = False
        bridge_vlan = False

        route = True
        pool = True
        firewall = True
        neighbor = True
        address_list = None
        dns = False

        ipv6_route = False
        ipv6_pool = False
        ipv6_firewall = False
        ipv6_neighbor = False
        ipv6_address_list = None

        poe = True
        monitor = True
        netwatch = True
        public_ip = True
        wireless = True
        wireless_clients = True
        capsman = True
        capsman_clients = True
        w60g = False

        eoip = False
        gre = False
        ipip = False
        lte = False
        ipsec = False
        switch_port = False

        kid_control_assigned = False
        kid_control_dynamic = False

        user = True
        queue = True

        bfd = False
        bgp = False
        routing_stats = False
        certificate = False
        container = False

        remote_dhcp_entry = None
        remote_capsman_entry = None

        interface_name_format = name
        check_for_updates = False

    [homelab]
        enabled = True
        hostname = 192.168.10.1
        port = 8728
        credentials_file = /etc/mktxp/credentials.yaml
        use_ssl = False
        plaintext_login = True

        # What to collect (overrides of [default] above).
        dhcp = True
        dhcp_lease = True
        interface = True
        route = True
        pool = True
        firewall = True
        monitor = True
        netwatch = True
        public_ip = True
        wireless = True
        wireless_clients = True
        capsman = True
        capsman_clients = True
        user = True
        queue = True
        dns = True

        # Skip for now — adds cardinality / requires extra perms.
        bandwidth = False
        connections = True
        connection_stats = False
        connection_stats_destinations = False
        routerboard = True
        installed_packages = False
        health = True

        # Use interface name + comment in labels so dashboards can show
        # human-readable names alongside ether1/etc.
        interface_name_format = combined
