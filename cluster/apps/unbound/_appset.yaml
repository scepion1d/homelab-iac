# Unbound recursive resolver sits behind AdGuard:
#   client -> AdGuard (filter + final-answer cache) -> Unbound (recursion + intermediate cache)

#                                                  -> root / TLD / authoritative servers

#

# Why it exists

# -------------

# AdGuard was forwarding every cache-miss to a fixed list of public

# resolvers (1.1.1.1, 8.8.8.8, 9.9.9.9). Three downsides:

#   1. Privacy: one party sees every domain we look up.

#   2. Single point of slowness: a degraded upstream PoP drags

#      everything until AdGuard's load-balancer notices.

#   3. Upstream rate limits / outages directly visible to us.

#

# Recursive resolution distributes the queries across the actual

# authoritative servers (each only sees the names it owns), validates

# DNSSEC locally, and keeps an aggressive intermediate cache that

# survives AdGuard restarts.

#

# Trade-off accepted: cold-cache queries do the full root -> TLD ->

# auth chain (50-200ms typical) instead of one round-trip to 1.1.1.1.

# Warm-cache responses are LAN-local and faster. CDN locality may

# regress for a few high-traffic domains; we'll revisit if monitoring

# shows real impact.

#

# This app declares its own ingress host explicitly (none -- Unbound is

# DNS-only, no HTTP UI). Root-ApplicationSet ingressHost injection is

# not used.
