apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  namespace: dns
  labels:
    app.kubernetes.io/name: unbound
spec:
  replicas: 1
  # Recreate (not RollingUpdate): only one Unbound pod can hold the
  # configmap-derived cert/key state at a time, and a brief outage on
  # config push is acceptable (AdGuard's cache absorbs it).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unbound
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unbound
    spec:
      # Init container generates the unbound-control TLS material
      # (self-signed, used only on 127.0.0.1) and fetches the DNSSEC
      # root trust anchor. Both files live in an emptyDir shared with
      # the main container -- they're not secrets we need to persist;
      # regenerating per-pod is fine.
      initContainers:
        - name: unbound-setup
          image: mvance/unbound:1.22.0
          command:
            - sh
            - -c
            - |
              set -e
              UBDIR=/opt/unbound/etc/unbound
              # Copy the ConfigMap-provided config into the emptyDir.
              cp /tmp/unbound-conf/unbound.conf $UBDIR/unbound.conf
              # Fetch / refresh the root DNSSEC trust anchor.
              unbound-anchor -a $UBDIR/trusted-key.key || true
               # Ensure the socket directory exists (emptyDir creates it,
              # but defensive).
              mkdir -p /var/run/unbound
          volumeMounts:
            - name: unbound-state
              mountPath: /opt/unbound/etc/unbound
            - name: unbound-conf
              mountPath: /tmp/unbound-conf
              readOnly: true
            - name: unbound-ctl
              mountPath: /var/run/unbound
      containers:
        - name: unbound
          image: mvance/unbound:1.22.0
          imagePullPolicy: IfNotPresent
          # Override the image's default CMD (/unbound.sh wrapper) and
          # call unbound directly. The wrapper does its own cert + root-
          # hints setup that conflicts with our init container; bypassing
          # it gives us full control over the config path.
          command: ["unbound"]
          args:
            - "-d"          # don't fork to background -- keep PID 1
            - "-v"          # verbosity level 1 (matches config)
            - "-c"
            - "/opt/unbound/etc/unbound/unbound.conf"
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
          livenessProbe:
            exec:
              command: ["unbound-control", "status"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: unbound-state
              mountPath: /opt/unbound/etc/unbound
            - name: unbound-ctl
              mountPath: /var/run/unbound
        - name: exporter
          image: homelab-registry:5111/unbound-exporter:v0.6.0
          imagePullPolicy: IfNotPresent
          args:
            - "-unbound.host"
            - "unix:///var/run/unbound/unbound.ctl"
            - "-unbound.ca"
            - ""
            - "-unbound.cert"
            - ""
          ports:
            - name: metrics
              containerPort: 9167
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: unbound-ctl
              mountPath: /var/run/unbound
              readOnly: true
        # Sidecar: dump/load Unbound cache to PVC so restarts skip
        # the cold-cache warm-up period.
        - name: unbound-cache-manager
          image: mvance/unbound:1.22.0
          command:
            - sh
            - -c
            - |
              log() { echo "$(date +%H:%M:%S) cache-manager: $*"; }
              CACHE=/var/cache/unbound/dump.bin
              CTL="unbound-control -c /opt/unbound/etc/unbound/unbound.conf"

              # Wait for Unbound to accept control commands.
              log "waiting for unbound..."
              until $CTL status >/dev/null 2>&1; do sleep 2; done
              log "unbound ready"

              # Load saved cache if a dump exists.
              if [ -f "$CACHE" ]; then
                log "loading cache from PVC"
                $CTL load_cache < "$CACHE" || true

                # Warm up: query every cached domain to force fresh
                # resolution for entries that expired between dump and load.
                log "warming up cache"
                WARM="${CACHE}.names"
                grep -E '\sIN\s+(A|AAAA|CNAME|MX|SRV|TXT)\s' "$CACHE" | awk '{print $1}' | sort -u > "$WARM"
                count=$(wc -l < "$WARM")
                log "$count domains to warm (40 parallel)"
                n=0
                while read name; do
                  log "warming $name"
                  unbound-host "$name" >/dev/null 2>&1 &
                  n=$((n + 1))
                  if [ $n -ge 40 ]; then
                    wait
                    n=0
                  fi
                done < "$WARM"
                wait
                rm -f "$WARM"
                log "warm-up complete"
              fi

              # Periodic dump every 5 minutes.
              dump() {
                log "dumping cache"
                $CTL dump_cache > "${CACHE}.tmp" && mv "${CACHE}.tmp" "$CACHE"
              }
              trap 'dump; exit 0' TERM INT
              while true; do
                sleep 300 &
                wait $!
                dump || true
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: unbound-ctl
              mountPath: /var/run/unbound
              readOnly: true
            - name: unbound-state
              mountPath: /opt/unbound/etc/unbound
              readOnly: true
            - name: cache-pvc
              mountPath: /var/cache/unbound
      volumes:
        - name: unbound-conf
          configMap:
            name: unbound-config
            items:
              - key: unbound.conf
                path: unbound.conf
        - name: unbound-state
          emptyDir: {}
        - name: unbound-ctl
          emptyDir: {}
        - name: cache-pvc
          persistentVolumeClaim:
            claimName: unbound-cache
