# Unbound recursive resolver config.
# Edit + commit -> kustomize hashes -> pod auto-restarts.
# Ref: https://unbound.docs.nlnetlabs.nl/en/latest/manpages/unbound.conf.html

server:
  interface: 0.0.0.0
  interface: ::0
  port: 53
  do-ip4: yes
  do-ip6: yes
  do-udp: yes
  do-tcp: yes

  # Allow cluster pod networks only (belt-and-braces; service is ClusterIP).
  access-control: 127.0.0.0/8 allow
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 192.168.0.0/16 allow
  access-control: fc00::/7 allow
  access-control: ::1/128 allow

  # Privacy: only ask each NS the minimal name it needs.
  qname-minimisation: yes
  # Synthesise NXDOMAIN from cached NSEC records.
  aggressive-nsec: yes
  # Background refresh before TTL expiry.
  prefetch: yes
  prefetch-key: yes
  # Serve stale while refreshing in background.
  serve-expired: yes
  serve-expired-ttl: 86400
  serve-expired-reply-ttl: 30

  # 128 MiB each for msg + rrset caches.
  msg-cache-size: 128m
  rrset-cache-size: 128m
  msg-cache-slabs: 16
  rrset-cache-slabs: 16
  infra-cache-slabs: 16
  key-cache-slabs: 16

  # Single thread — optimal for homelab query rates.
  num-threads: 1

  # DNSSEC disabled — trust-anchor path broken with mvance/unbound --prefix.
  # TODO: re-enable once path is sorted.
  module-config: "iterator"

  # Prefer IPv4 — v6 through Colima/k3d is unreliable.
  prefer-ip6: no

  verbosity: 1
  log-queries: no
  log-replies: no
  log-servfail: yes
  use-syslog: no
  logfile: ""

  # Extended stats for the Prometheus exporter sidecar.
  extended-statistics: yes
  statistics-interval: 0
  statistics-cumulative: no

  hide-identity: yes
  hide-version: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-below-nxdomain: yes
  harden-referral-path: yes
  harden-algo-downgrade: yes
  unwanted-reply-threshold: 10000000

  edns-buffer-size: 1232
  edns-buffer-size: 1232

# --- Remote control ---------------------------------------------------------
# Unix socket for unbound-control + the Prometheus exporter sidecar.
# No TLS needed — the socket is filesystem-local, shared via an emptyDir
# volume between the unbound and exporter containers. The exporter
# connects with `unbound_exporter -unbound.host unix:///var/run/unbound/unbound.ctl`.
#
# This replaced the earlier TLS-based remote-control that kept breaking
# on cert-path mismatches with mvance/unbound's --prefix=/opt/unbound.
remote-control:
  control-enable: yes
  control-interface: /var/run/unbound/unbound.ctl
