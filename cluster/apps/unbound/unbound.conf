# Unbound recursive resolver config.
# Edit + commit -> kustomize hashes -> pod auto-restarts.
# Ref: https://unbound.docs.nlnetlabs.nl/en/latest/manpages/unbound.conf.html

server:
  interface: 0.0.0.0
  interface: ::0
  port: 53
  do-ip4: yes
  do-ip6: yes
  do-udp: yes
  do-tcp: yes

  access-control: 127.0.0.0/8 allow
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 192.168.0.0/16 allow
  access-control: fc00::/7 allow
  access-control: ::1/128 allow

  # -- DNS rebinding protection: block private IPs in answers.
  private-address: 10.0.0.0/8
  private-address: 172.16.0.0/12
  private-address: 192.168.0.0/16
  private-address: 169.254.0.0/16
  private-address: fd00::/8
  private-address: fe80::/10
  private-domain: "int." # Homelab ingress domain — allow it through rebinding protection.

  # --- Cache poisoning protection ---
  # DNS 0x20 (use-caps-for-id) is disabled. Many authoritative servers
  # (especially CDNs) downcase queries in their replies, which Unbound
  # then treats as suspicious and retries — adding hundreds of ms to
  # tail latency. Modern SLD / DNSSEC + source-port randomization
  # cover the same threat model with no compatibility cost.
  use-caps-for-id: no

  # --- Core performance ---
  num-threads: 2
  so-reuseport: yes

  # --- EDNS / transport ---
  edns-buffer-size: 1232
  max-udp-size: 1232
  outgoing-num-tcp: 20
  incoming-num-tcp: 20
  tcp-idle-timeout: 30000
  outgoing-range: 8192
  num-queries-per-thread: 4096

  # --- Cache ---
  msg-cache-size: 64m
  rrset-cache-size: 128m
  key-cache-size: 16m
  neg-cache-size: 8m
  # cache-min-ttl deliberately HIGHER than AdGuard's cache_ttl_min (60s) so
  # Unbound entries outlive AdGuard's. Otherwise both layers expire in lock-
  # step, AdGuard's re-ask always misses Unbound, and every re-ask pays the
  # full recursive walk (~500ms p95). 5min floor keeps Unbound hot without
  # ignoring deliberately-short upstream TTLs for too long.
  cache-min-ttl: 300
  cache-max-ttl: 86400
  cache-min-negative-ttl: 60
  cache-max-negative-ttl: 3600

  prefetch: yes
  prefetch-key: yes
  serve-expired: yes
  serve-expired-ttl: 3600
  serve-expired-reply-ttl: 30
  # 0 = serve stale immediately (RFC 8767), refresh in background. Trade-off:
  # stale answers may be served for up to serve-expired-ttl during upstream
  # outages instead of returning SERVFAIL. For a homelab this is the right
  # call — tail latency collapses and metrics become truthful.
  serve-expired-client-timeout: 0

  # --- Slabs (match num-threads) ---
  msg-cache-slabs: 2
  rrset-cache-slabs: 2
  infra-cache-slabs: 2
  key-cache-slabs: 2
  infra-cache-numhosts: 10000

  # --- Resolution quality ---
  qname-minimisation: yes
  aggressive-nsec: yes
  minimal-responses: yes
  rrset-roundrobin: yes

  # --- Hardening ---
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-large-queries: yes
  harden-short-bufsize: yes
  harden-below-nxdomain: yes
  # harden-referral-path re-verifies parent-vs-child NS records on every
  # delegation, multiplying upstream packets by 2-3x. DNSSEC validation
  # already covers the same threat for signed zones — disabling this on a
  # homelab is a cheap latency win with negligible security delta.
  harden-referral-path: no
  harden-algo-downgrade: yes
  unwanted-reply-threshold: 10000000

  # --- Network buffers ---
  # so-rcvbuf/so-sndbuf left at kernel default (0). Setting >default
  # requires raising net.core.{rmem,wmem}_max in the Colima VM, which
  # the container can't do (read-only /proc/sys). Without that the
  # value is silently clamped, so adding CAP_NET_ADMIN to the pod
  # would be privilege without benefit.
  so-rcvbuf: 0
  so-sndbuf: 0
  sock-queue-timeout: 3

  # --- Identity ---
  hide-identity: yes
  hide-version: yes

  # Prefer IPv4 — v6 through Colima/k3d is unreliable.
  prefer-ip6: no

  # -- DNSSEC
  auto-trust-anchor-file: "/opt/unbound/etc/unbound/trusted-key.key"
  module-config: "validator iterator"

  # --- Logging ---
  verbosity: 1
  log-queries: no
  log-replies: no
  log-servfail: yes
  use-syslog: no
  logfile: ""

  # --- Stats (Prometheus exporter sidecar) ---
  extended-statistics: yes
  statistics-interval: 0
  statistics-cumulative: no

  # --- Local zone: *.int → homelab ingress ---
  local-zone: "int." redirect
  local-data: "int. A 192.168.10.3"

# Unix socket for unbound-control + the Prometheus exporter sidecar.
remote-control:
  control-enable: yes
  control-interface: /var/run/unbound/unbound.ctl
