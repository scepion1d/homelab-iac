namespace: monitoring
revision: 15
source:
  repoURL: https://prometheus-community.github.io/helm-charts
  chart: prometheus
  targetRevision: 25.27.0
  helm:
    values:
      server:
        retention: "7d"
        persistentVolume:
          enabled: true
          size: 8Gi
        service:
          type: ClusterIP
          servicePort: 80
        global:
          scrape_interval: 30s
          scrape_timeout: 20s
      serverFiles:
        host-targets.yml:
          scrape_configs: []
        mac-host.yml:
          scrape_configs:
            - job_name: mac-host
              scrape_interval: 30s
              scrape_timeout: 10s
              static_configs:
                - targets:
                    - 192.168.10.3:9100
                  labels:
                    host: mac
                    source: host-native
      scrapeConfigFiles:
        - /etc/config/host-targets.yml
        - /etc/config/mac-host.yml
      alertmanager:
        persistence:
          enabled: false
      prometheus-pushgateway:
        enabled: false
