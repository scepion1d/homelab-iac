# Prometheus — metrics storage + query engine.
#
# Bundled with this chart:
#   - prometheus-server     (the TSDB + UI we expose)
#   - alertmanager          (alert routing; unused here yet, harmless)
#   - node-exporter         (per-node host metrics: cpu/mem/disk/network)
#   - kube-state-metrics    (cluster object metrics: pods, deployments, ...)
#   - pushgateway           (for short-lived job metrics; unused, harmless)
#
# Grafana auto-uses this as its default datasource — see
# cluster/apps/grafana/_appset.yaml (`datasources` block).
#
# Ingress is in the sibling `prometheus-ingress` app so this file stays
# pure Helm.
#
# Security note: the Prometheus UI has NO auth. Exposing on the LAN means
# anyone on the network can query metrics. Fine for a trusted home network;
# add nginx basic-auth via ingress annotations if that ever changes.
namespace: monitoring
revision: 11

source:
  repoURL: https://prometheus-community.github.io/helm-charts
  chart: prometheus
  targetRevision: 25.27.0
  helm:
    values:
      server:
        # Trim retention; with all the kube-state + node-exporter metrics
        # at 15s scrape, 7 days at 50k series is plenty for a homelab.
        retention: "7d"
        persistentVolume:
          enabled: true
          size: 8Gi
        service:
          type: ClusterIP
          servicePort: 80
        # Chart default is 1m, which is too coarse for a small cluster —
        # CPU/network graphs end up step-shaped. 15s matches what most
        # Grafana dashboards (and our `$__rate_interval`) assume. The
        # mikrotik job overrides this with its own 30s interval below.
        global:
          scrape_interval: 30s
          scrape_timeout: 20s

      alertmanager:
        # Disable persistence — we don't route alerts anywhere yet.
        persistence:
          enabled: false

      # Don't ship pushgateway; we don't have batch jobs to scrape.
      "prometheus-pushgateway":
        enabled: false

      # No custom scrape configs at the moment. The MikroTik router is
      # exported by `mikrotik-exporter` (mktxp) and is picked up by the
      # chart's default `kubernetes-service-endpoints` job via the
      # `prometheus.io/scrape: "true"` annotation on its Service.
      #
      # If you ever need to add a static-target job, the working pattern
      # is `serverFiles.<name>.yml: { scrape_configs: [...] }` plus
      # `scrapeConfigFiles: [/etc/config/<name>.yml]`. The chart's
      # `extraScrapeConfigs:` (stringified YAML) and `scrapeConfigs:`
      # (map) both proved fragile — see git history for the autopsy.
