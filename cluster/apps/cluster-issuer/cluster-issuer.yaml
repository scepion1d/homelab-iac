# Self-signed cluster CA. Chain: SelfSigned issuer → CA cert (isCA) → CA issuer.
# Every app cert chains back to the same root → install one CA on a device
# and every current/future app is trusted.
# Depends on cert-manager CRDs; Argo CD retries until cert-manager is up.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-ca
  namespace: cert-manager   # ClusterIssuer below looks here by default
spec:
  isCA: true
  commonName: homelab-ca
  secretName: homelab-ca-key-pair
  duration: 87600h     # 10 years
  renewBefore: 720h    # auto-renew with 30 days remaining
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-ca
spec:
  ca:
    secretName: homelab-ca-key-pair
