apiVersion: 1
policies:
  - orgId: 1
    receiver: slack-cluster
    group_by: [alertname, entity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Silence info-tier alerts (placeholder route; no rules currently use it).
      - receiver: slack-cluster
        matchers:
          - severity = info
        mute_time_intervals: [always]
        continue: false

      # Critical override — same channel split as warning, tighter repeat.
      - receiver: slack-cluster
        matchers:
          - severity = critical
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        routes:
          - receiver: slack-infra
            matchers: [channel = infra]
          - receiver: slack-cluster
            matchers: [channel = cluster]
          - receiver: slack-network
            matchers: [channel = network]
          - receiver: slack-dns
            matchers: [channel = dns]

      # Warning routing (also the default for anything without severity).
      - receiver: slack-infra
        matchers: [channel = infra]
      - receiver: slack-cluster
        matchers: [channel = cluster]
      - receiver: slack-network
        matchers: [channel = network]
      - receiver: slack-dns
        matchers: [channel = dns]
