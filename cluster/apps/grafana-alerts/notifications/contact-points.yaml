apiVersion: 1
contactPoints:
  - orgId: 1
    name: slack-infra
    receivers:
      - uid: slack-infra
        type: slack
        disableResolveMessage: false
        settings:
          token: '$SLACK_BOT_TOKEN'
          recipient: '#infra'
          title: '{{ template "slack.homelab.title" . }}'
          text: '{{ template "slack.homelab.text" . }}'
          color: '{{ template "slack.homelab.color" . }}'

  - orgId: 1
