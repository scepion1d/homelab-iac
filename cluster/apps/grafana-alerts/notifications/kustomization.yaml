# Generates one ConfigMap per Grafana provisioning file. The sidecar imports
# each as a separate provisioning resource (contact points, policies, etc.).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  # Sidecar treats every new CM name as a new resource and re-imports —
  # without this, every kustomize render would churn imports.
  disableNameSuffixHash: true

configMapGenerator:
  - name: alert-contact-points
    files:
      - contact-points.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-policies
    files:
      - policies.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-templates
    files:
      - templates.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-mute-timings
    files:
      - mute-timings.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-inhibit-rules
    files:
      - inhibit-rules.yaml
    options:
      labels:
        grafana_alert: "1"
