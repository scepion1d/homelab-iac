apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: alert-contact-points
    files:
      - contact-points.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-policies
    files:
      - policies.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-templates
    files:
      - templates.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-mute-timings
    files:
      - mute-timings.yaml
    options:
      labels:
        grafana_alert: "1"
  - name: alert-inhibit-rules
    files:
      - inhibit-rules.yaml
    options:
      labels:
        grafana_alert: "1"
