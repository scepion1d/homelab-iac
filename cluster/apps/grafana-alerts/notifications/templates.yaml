# Shared Slack message templates (consumed by contact-points.yaml).
#
# Mobile-first single-column card. Header text carries severity + alertname
# so Slack lock-screen previews are immediately useful. `<!here>` is added
# inline for critical-tier firing alerts (per design: orange = silent,
# red = mention @here). Resolved messages are trimmed.
#
# Template variable cheatsheet (Grafana managed alerts):
#   .Status              "firing" | "resolved"
#   .CommonLabels        labels common to all alerts in the group
#   .CommonAnnotations   annotations common to all alerts in the group
#   .Alerts              list of individual alert instances
#     .Alerts[].Labels        per-instance labels
#     .Alerts[].Annotations   per-instance annotations
#     .Alerts[].Values        map refId -> *float64  (eval values)
#     .Alerts[].StartsAt      time.Time
#     .Alerts[].GeneratorURL  link to alert detail in Grafana
#     .Alerts[].SilenceURL    link to silence form prefilled with labels
#     .Alerts[].DashboardURL  set only when rule has dashboardUid (we use
#                             the `dashboard_url` annotation instead)
apiVersion: 1
templates:
  - orgId: 1
    name: homelab-slack
    template: |-
      {{ define "slack.homelab.title" -}}
      {{- if eq .Status "resolved" -}}
      ✅ RESOLVED · {{ .CommonLabels.alertname }}
      {{- else if eq (index .CommonLabels "severity") "critical" -}}
      🔴 CRITICAL · {{ .CommonLabels.alertname }}
      {{- else -}}
      🟠 WARNING · {{ .CommonLabels.alertname }}
      {{- end -}}
      {{ end }}

      {{ define "slack.homelab.color" -}}
      {{- if eq .Status "resolved" -}}#2EB67D
      {{- else if eq (index .CommonLabels "severity") "critical" -}}#E01E5A
      {{- else -}}#ECB22E
      {{- end -}}
      {{ end }}

      {{ define "slack.homelab.text" -}}
      {{- if and (eq .Status "firing") (eq (index .CommonLabels "severity") "critical") -}}
      <!here>
      {{ end -}}
      {{ range .Alerts -}}
      *{{ .Annotations.summary }}*

      `entity`     {{ .Labels.entity }}
      `component`  {{ .Labels.component }}
      {{ if .Labels.instance -}}
      `instance`   {{ .Labels.instance }}
      {{ end -}}
      {{ if .Labels.node -}}
      `node`       {{ .Labels.node }}
      {{ end -}}
      {{ if .Labels.namespace -}}
      `namespace`  {{ .Labels.namespace }}/{{ .Labels.pod }}
      {{ end -}}
      `started`    {{ .StartsAt.Format "15:04 MST" }}
      {{ if and (ne .Status "resolved") .Annotations.description }}

      {{ .Annotations.description }}
      {{- end }}
      {{ if ne .Status "resolved" }}

      {{ if .Annotations.dashboard_url -}}<{{ .Annotations.dashboard_url }}|📊 Dashboard>  ·  {{ end -}}
      <{{ .SilenceURL }}|🔕 Silence>  ·  <{{ .GeneratorURL }}|🔗 Grafana>
      {{- end }}

      {{ end -}}
      {{ end }}
