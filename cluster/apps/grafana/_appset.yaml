namespace: monitoring
revision: 8

# The root ApplicationSet injects a helm.parameter that sets `ingressHelmParam`
# to `https://<ingressHost>.<lanDomain>`. This is what tells Grafana the
# external URL for its share/invite links.
# `lanDomain` lives in cluster/globals.yaml.
ingressHost: grafana
ingressHelmParam: 'grafana\.ini.server.root_url'

source:
  repoURL: https://grafana.github.io/helm-charts
  chart: grafana
  targetRevision: 8.5.1
  helm:
    # `values:` accepts either a literal-block string or (as here) a normal
    # YAML map. The root ApplicationSet converts maps to a string for Argo CD.
    values:
      # Admin credentials come from the `grafana-admin` Secret created out of
      # band (see README "Bootstrap" section). Without `existingSecret` the
      # chart re-rolls a random password on every helm render → Argo CD
      # rewrites the Secret on every sync.
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password

      service:
        type: ClusterIP

      # Sidecar watches namespace for ConfigMaps labeled `grafana_dashboard=1`
      # and imports their JSON keys into Grafana. Dashboards live in the
      # sibling `grafana-dashboards` app (per-folder structure).
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: monitoring
          # Read `grafana_folder` annotation on the ConfigMap and place the
          # dashboard in that Grafana folder (auto-created).
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true

      # Provision the Prometheus datasource at startup (no clicking in the UI).
      # Points at the in-cluster service from cluster/apps/prometheus/.
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus-server.monitoring.svc:80
              isDefault: true

      # root_url is set via helm.parameters by the root ApplicationSet —
      # see ingressHost / ingressHelmParam above.
      "grafana.ini":
        server:
          serve_from_sub_path: false
        dashboards:
          # Each dashboard ConfigMap in cluster/apps/grafana-dashboards/
          # uses `<name>.json=dashboard.json` so the sidecar writes them to
          #   /tmp/dashboards/<name>.json
          # Point home at the homelab overview file.
          default_home_dashboard_path: /tmp/dashboards/homelab.json
