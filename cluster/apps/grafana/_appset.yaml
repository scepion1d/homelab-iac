namespace: monitoring
revision: 11
ingressHost: grafana
ingressHelmParam: 'grafana\.ini.server.root_url'
source:
  repoURL: https://grafana-community.github.io/helm-charts
  chart: grafana
  targetRevision: 11.6.1
  helm:
    values:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      service:
        type: ClusterIP
      persistence:
        enabled: true
        size: 128Mi
      plugins:
        - grafana-polystat-panel
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: monitoring
          folderAnnotation: grafana_folder
          watchMethod: WATCH
          resource: both
          reloadURL: "http://localhost:3000/api/admin/provisioning/dashboards/reload"
          provider:
            foldersFromFilesStructure: true
            allowUiUpdates: false
        alerts:
          enabled: true
          label: grafana_alert
          labelValue: "1"
          searchNamespace: monitoring
          watchMethod: WATCH
          resource: both
          reloadURL: "http://localhost:3000/api/admin/provisioning/alerting/reload"
      imageRenderer:
        enabled: true
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              uid: prometheus
              type: prometheus
              access: proxy
              url: http://prometheus-server.monitoring.svc:80
              isDefault: true
      envValueFrom:
        SLACK_BOT_TOKEN:
          secretKeyRef:
            name: grafana-slack
            key: token
      "grafana.ini":
        server:
          serve_from_sub_path: false
        dashboards:
          default_home_dashboard_path: /tmp/dashboards/homelab.json
        unified_alerting.screenshots:
          capture: true
