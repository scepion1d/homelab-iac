apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: dashboard-mikrotik
    files:
      # Unique key so this doesn't collide with sibling dashboards in
      # the sidecar's /tmp/dashboards/ output directory.
      - mikrotik.json=dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
