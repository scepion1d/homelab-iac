apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: dashboard-router
    files:
      # Unique key so this doesn't collide with sibling dashboards in
      # the sidecar's /tmp/dashboards/ output directory.
      - router.json=dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        # Sidecar (folderAnnotation: grafana_folder in cluster/apps/grafana/_appset.yaml)
        # places this dashboard inside the matching Grafana folder, alongside
        # the alert rules from grafana-alerts/rules/router/.
        grafana_folder: Infra
