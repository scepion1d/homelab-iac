apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: dashboard-homelab
    files:
      # `<key>=<source>` makes the ConfigMap entry name unique so the
      # grafana sidecar writes it to a unique path under /tmp/dashboards/.
      # If all dashboards used `dashboard.json`, they would overwrite each
      # other and grafana logs `could not resolve dashboards:uid:X`.
      - homelab.json=dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
