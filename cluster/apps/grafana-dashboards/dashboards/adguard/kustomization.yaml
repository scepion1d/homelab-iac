apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: dashboard-adguard
    files:
      - adguard.json=dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        # Sidecar (folderAnnotation: grafana_folder in cluster/apps/grafana/_appset.yaml)
        # places this dashboard inside the matching Grafana folder, alongside
        # the alert rules from grafana-alerts/rules/adguard/.
        grafana_folder: DNS
