apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard
  namespace: dns
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: homelab-ca
spec:
  ingressClassName: nginx
  rules:
    - host: adguard.int
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-ui
                port:
                  number: 80
    - host: adguard.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-ui
                port:
                  number: 80
    - host: adguard.192-168-10-3.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-ui
                port:
                  number: 80
    - host: adguard-setup.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-ui
                port:
                  number: 3000
  tls:
    - secretName: adguard-tls
      hosts:
        - adguard.int
        - adguard.localhost
        - adguard.192-168-10-3.nip.io
        - adguard-setup.localhost
