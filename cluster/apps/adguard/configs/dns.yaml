upstream_dns:
  - "10.43.10.43"              # Unbound recursive (pinned ClusterIP)

# Used only when primary upstream(s) fail.
fallback_dns:
  - "192.168.10.1"             # MikroTik fallback
  - "1.1.1.1"                  # Cloudflare fallback

# Single recursive path (AdGuard -> Unbound) keeps cache warm and metrics sane.
upstream_mode: load_balance

# Used only to resolve upstream hostnames at startup.
bootstrap_dns:
  - "1.1.1.1"
  - "8.8.8.8"
  - "9.9.9.9"

# Per-client rate limit, aggregated by /16 (v4) and /56 (v6).
ratelimit: 50
ratelimit_subnet_len_ipv4: 16
ratelimit_subnet_len_ipv6: 56

# Forward coarse client subnet for CDN locality.
edns_cs_enabled: true

# AdGuard cache DISABLED on purpose. Two caches in series with identical TTL
# clamps make the second one (Unbound) useless — by the time AdGuard re-asks
# Unbound, Unbound's entry has also expired, so Unbound never hits its cache
# and prefetch/serve-expired never trigger. Letting Unbound own the cache
# turns it into the real working set + DNSSEC-validated recursive resolver,
# while AdGuard stays a pure filter/blocker (still O(1), filtering happens
# before any upstream call). cache_ttl_min/max are kept as documentation but
# are no-ops while cache_size=0.
cache_size: 0
cache_ttl_min: 60
cache_ttl_max: 86400

# Short blocked-response TTL so filter changes take effect quickly.
blocked_response_ttl: 60
