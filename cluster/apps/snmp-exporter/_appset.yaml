# snmp_exporter — Prometheus scrapes
#   http://snmp-exporter/snmp?target=<router-ip>&module=<m>
# and snmp-exporter SNMP-GETs the router for the OIDs in module <m>.
namespace: monitoring
revision: 2

source:
  repoURL: https://prometheus-community.github.io/helm-charts
  chart: prometheus-snmp-exporter
  targetRevision: 6.0.0
  helm:
    values: |
      service:
        type: ClusterIP
        port: 9116

      # snmp.yml — overrides the chart default. Defines the `mikrotik` module
      # referenced by the Prometheus scrape job in cluster/apps/prometheus/.
      # Chart requires `config` to be a YAML *string*, hence the `|`.
      # v0.27+ schema: `auths` is top-level, modules reference one via the
      # `auth=<name>` URL param. See auth-split-migration in snmp_exporter docs.
      config: |
        auths:
          homelab_v2:
            community: homelab
            version: 2
        modules:
          mikrotik:
            walk:
              - 1.3.6.1.2.1.2              # IF-MIB::interfaces
              - 1.3.6.1.2.1.25.2           # hrStorage
              - 1.3.6.1.2.1.25.3           # hrDevice
              - 1.3.6.1.4.1.14988.1.1.1    # mtxrWireless
              - 1.3.6.1.4.1.14988.1.1.3    # mtxrHealth
              - 1.3.6.1.4.1.14988.1.1.4    # mtxrLicense
              - 1.3.6.1.4.1.14988.1.1.7    # mtxrSystem
