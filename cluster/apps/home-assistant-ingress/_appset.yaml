namespace: home-assistant
revision: 5
# Subdomain for the LAN-reachable hostname.

# The root ApplicationSet injects a kustomize patch that adds

# `<ingressHost>.<lanDomain>` to the Ingress's server-alias + tls.hosts.

# `lanDomain` lives in cluster/globals.yaml.

#

# This app puts a friendly URL (https://homeassistant.int) in front of

# the host-side Home Assistant container (host/apps/home-assistant/).

# HA itself runs on Colima Docker, not in k3d — but nginx-ingress can

# proxy out to it via an ExternalName Service that resolves to the host

# LAN IP. Bringing the Ingress into the cluster gives us:

#   - the same wildcard TLS cert + ssl-redirect as grafana/prometheus

#   - no `:8123` port in URLs

#   - WebSocket support (HA UI is heavily WS-based)

# Prometheus scrapes HA directly on `${HOST_IP}:8123` (see

# host/apps/home-assistant/prometheus-target.yaml) — no need to route the

# scrape through ingress.
ingressHost: homeassistant
