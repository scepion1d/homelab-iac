apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: homelab
servers: 1
agents: 2
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
  - port: 53:53/udp
    nodeFilters:
      - loadbalancer
  - port: 53:53/tcp
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      # Disable bundled Traefik — we'll manage ingress via Argo CD instead.
      - arg: --disable=traefik
        nodeFilters:
          - server:*
