# Unbound recursive resolver — v2 carry-over.
# Settings here match v1 baseline (tagged as v1 in the repo, commit
# 4c7a83e). Re-tune in subsequent commits, one knob at a time.

server:
  interface: 0.0.0.0
  interface: ::0
  port: 53
  do-ip4: yes
  do-ip6: yes
  do-udp: yes
  do-tcp: yes

  access-control: 127.0.0.0/8 allow
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 192.168.0.0/16 allow
  access-control: fc00::/7 allow
  access-control: ::1/128 allow

  # --- Core performance ---
  num-threads: 2
  so-reuseport: yes

  # --- EDNS / transport ---
  edns-buffer-size: 1232
  max-udp-size: 1232
  outgoing-num-tcp: 20
  incoming-num-tcp: 20
  tcp-idle-timeout: 30000

  # --- Cache ---
  msg-cache-size: 64m
  rrset-cache-size: 128m
  key-cache-size: 16m
  neg-cache-size: 8m
  cache-min-ttl: 0
  cache-max-ttl: 86400
  cache-max-negative-ttl: 3600

  prefetch: yes
  prefetch-key: yes
  serve-expired: yes
  serve-expired-ttl: 86400
  serve-expired-reply-ttl: 30

  # --- Slabs (match num-threads) ---
  msg-cache-slabs: 2
  rrset-cache-slabs: 2
  infra-cache-slabs: 2
  key-cache-slabs: 2

  # --- Resolution quality ---
  qname-minimisation: yes
  aggressive-nsec: yes
  minimal-responses: yes
  rrset-roundrobin: yes

  # --- Hardening ---
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-large-queries: yes
  harden-short-bufsize: yes
  harden-below-nxdomain: yes
  harden-referral-path: yes
  harden-algo-downgrade: yes
  unwanted-reply-threshold: 10000000

  # --- Network buffers ---
  # 1m here is best-effort. Linux clamps to net.core.{rmem,wmem}_max;
  # in a stock Colima VM that's typically ~212 KiB, so the value is
  # silently capped. Left at 1m so it works if the kernel limit ever
  # rises; no privilege escalation in compose to force it.
  so-rcvbuf: 1m
  so-sndbuf: 1m
  sock-queue-timeout: 3

  # --- Identity ---
  hide-identity: yes
  hide-version: yes

  # Prefer IPv4 — v6 through Colima is unreliable.
  prefer-ip6: no

  # DNSSEC: disabled in v1 (trust anchor wasn't fetched reliably). v2
  # can re-enable once the cache-dumper sidecar's init step pulls the
  # root trust anchor at startup — tracked separately.
  module-config: "iterator"

  # --- Logging ---
  verbosity: 1
  log-queries: no
  log-replies: no
  log-servfail: yes
  use-syslog: no
  logfile: ""

  # --- Stats (Prometheus exporter) ---
  extended-statistics: yes
  statistics-interval: 0
  statistics-cumulative: no

  # --- Local zone: *.int → homelab ingress (host IP) ---
  # Hardcoded to match v1 baseline. If hostIp changes, edit here and
  # rotate the configmap. (Templating from globals.yaml is a v2 follow-up.)
  local-zone: "int." redirect
  local-data: "int. A 192.168.10.3"

# Unix socket for unbound-control + the Prometheus exporter sidecar.
remote-control:
  control-enable: yes
  control-interface: /var/run/unbound/unbound.ctl
