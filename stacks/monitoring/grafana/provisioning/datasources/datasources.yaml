apiVersion: 1
datasources:
  - name: Prometheus
    # Pin UID so v1-carried-over dashboards (which embed datasource UIDs
    # in panel queries) keep working without re-saving each one.
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
