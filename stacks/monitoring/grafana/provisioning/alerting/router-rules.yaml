apiVersion: 1
# Router (MikroTik) alerts. UI folder: infra.
# Slack routing: temperature/cpu/memory/exporter → #infra (channel=infra);
#                interface flapping → #network (channel=network).
#
# v2 adaptations from v1 cluster/apps/grafana-alerts/rules/router/rules.yaml:
#   service="mikrotik-exporter" → job="mikrotik" (v2 prometheus scrape name)
#
# Dropped from v1:
#   - router-dhcp-quarantined-lease (CAPsMAN-only; revisit if/when
#     mktxp_capsman_* series appears with usable labels in v2).
groups:
  - orgId: 1
    name: router.homelab
    folder: infra
    interval: 1m
    rules:
      # ─────────────────────────────────────────────────────────────────────
      # mktxp exporter down: inhibits every other router-* rule.
      - uid: router-mktxp-exporter-down
        title: router-mktxp-exporter-down
        condition: B
        for: 2m
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'up{job="mikrotik"}'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 1'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: router
          component: exporter
          channel: infra
        annotations:
          summary: 'Router exporter (mktxp) down'
          description: 'mktxp exporter has been down for 2m. Router visibility lost; downstream router alerts suppressed.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: 'up'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: router-temperature-warning
        title: router-temperature-warning
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mktxp_system_cpu_temperature'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 60'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: router
          component: temperature
          channel: infra
        annotations:
          summary: 'Router CPU temp {{ printf "%.0f" $values.A.Value }}°C'
          description: 'mktxp reports CPU temperature ≥60°C for 5m on `{{ $labels.routerboard_name }}`.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: '°C'
        isPaused: false

      - uid: router-temperature-critical
        title: router-temperature-critical
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mktxp_system_cpu_temperature'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 75'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: router
          component: temperature
          channel: infra
        annotations:
          summary: 'Router CPU temp {{ printf "%.0f" $values.A.Value }}°C (critical)'
          description: 'mktxp reports CPU temperature ≥75°C for 2m on `{{ $labels.routerboard_name }}`. Investigate cooling.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: '°C'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # RouterOS CPU load is already a percentage 0..100.
      - uid: router-cpu-load-warning
        title: router-cpu-load-warning
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mktxp_system_cpu_load'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 15'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: router
          component: cpu
          channel: infra
        annotations:
          summary: 'Router CPU load {{ printf "%.0f" $values.A.Value }}%'
          description: 'RouterOS CPU load ≥15% for 10m on `{{ $labels.routerboard_name }}`.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: 'load%'
        isPaused: false

      - uid: router-cpu-load-critical
        title: router-cpu-load-critical
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mktxp_system_cpu_load'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 50'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: router
          component: cpu
          channel: infra
        annotations:
          summary: 'Router CPU load {{ printf "%.0f" $values.A.Value }}% (critical)'
          description: 'RouterOS CPU load ≥50% for 5m on `{{ $labels.routerboard_name }}`.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: 'load%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: router-memory-warning
        title: router-memory-warning
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - mktxp_system_free_memory / mktxp_system_total_memory) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 50'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: router
          component: memory
          channel: infra
        annotations:
          summary: 'Router RAM {{ printf "%.0f" $values.A.Value }}% used'
          description: 'RouterOS memory ≥50% used for 10m on `{{ $labels.routerboard_name }}`.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: 'used%'
        isPaused: false

      - uid: router-memory-critical
        title: router-memory-critical
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - mktxp_system_free_memory / mktxp_system_total_memory) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 75'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: router
          component: memory
          channel: infra
        annotations:
          summary: 'Router RAM {{ printf "%.0f" $values.A.Value }}% used (critical)'
          description: 'RouterOS memory ≥75% used for 5m on `{{ $labels.routerboard_name }}`.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Interface flapping: ≥4 state changes in 15m. Excludes vpn ifaces.
      - uid: router-iface-flapping
        title: router-iface-flapping
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 900, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'changes(mktxp_interface_running{name!~".*vpn.*"}[15m])'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 4'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: router
          component: iface
          channel: network
        annotations:
          summary: 'Interface {{ $labels.name }} flapping'
          description: 'Interface `{{ $labels.name }}` changed state {{ printf "%.0f" $values.A.Value }}× in 15m.'
          dashboard_url: 'https://grafana.int/d/router-overview/router'
          value_label: 'changes/15m'
        isPaused: false
