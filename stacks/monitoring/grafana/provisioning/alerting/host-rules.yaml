apiVersion: 1
# Mac mini host alerts. UI folder: infra. Slack: channel=infra (slack-infra).
#
# v2 adaptations from v1 cluster/apps/grafana-alerts/rules/host/rules.yaml:
#   - host-mac-exporter-down: job="mac-host" (v2 prometheus scrape name)
#   - dashboard_url: https://grafana.int/d/host-overview/host (matches v2
#     dashboard path stacks/monitoring/grafana/dashboards/infra/host.json
#     with uid=host-overview)
#   - host-colima-down / host-launchd-core-unloaded dropped: no k3d cluster
#     to protect, and the up{job="mac-host"} alert already fires if Colima/
#     mac-extras goes away.
groups:
  - orgId: 1
    name: host.homelab
    folder: infra
    interval: 1m
    rules:
      # ─────────────────────────────────────────────────────────────────────
      # Mac host scrape is dead. Inhibits every other host-* rule via
      # alerting/inhibit-rules.yaml.
      - uid: host-mac-exporter-down
        title: host-mac-exporter-down
        condition: B
        for: 2m
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'up{job="mac-host"}'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 1'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: host
          component: exporter
          channel: infra
        annotations:
          summary: 'Mac host exporter unreachable'
          description: 'Prometheus has not scraped the macOS host exporter for 2m. Host visibility lost; downstream host alerts suppressed.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'up'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Textfile collector failing — node_exporter up but mac-extras.prom
      # doesn't parse. mac_* metrics stale, standard node_exporter metrics
      # still flow.
      - uid: host-textfile-scrape-error
        title: host-textfile-scrape-error
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'max(node_textfile_scrape_error{host="mac"})'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 0'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: host
          component: textfile
          channel: infra
        annotations:
          summary: 'mac-extras.prom textfile parse failing'
          description: 'node_exporter reports textfile_scrape_error=1 for 10m. Check /var/log/homelab-mac-extras.log.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'err'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # AC power lost. Mac mini should always be on AC.
      - uid: host-on-battery
        title: host-on-battery
        condition: B
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mac_power_on_ac'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 1'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: host
          component: power
          channel: infra
        annotations:
          summary: 'Host on battery power'
          description: 'mac_power_on_ac=0 for 1m. Investigate AC / UPS state.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'on_ac'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # CPU temperature warning / critical. Match router thresholds (60/75).
      - uid: host-cpu-temp-warning
        title: host-cpu-temp-warning
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mac_cpu_temp_celsius'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 60'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: host
          component: temperature
          channel: infra
        annotations:
          summary: 'Host CPU temp {{ printf "%.0f" $values.A.Value }}°C'
          description: 'CPU temperature ≥60°C for 5m. Check airflow / vent obstruction.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: '°C'
        isPaused: false

      - uid: host-cpu-temp-critical
        title: host-cpu-temp-critical
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mac_cpu_temp_celsius'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 75'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: host
          component: temperature
          channel: infra
        annotations:
          summary: 'Host CPU temp {{ printf "%.0f" $values.A.Value }}°C (critical)'
          description: 'CPU temperature ≥75°C for 2m. Thermal throttle imminent. Investigate cooling.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: '°C'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Thermal throttle active — macOS has capped the CPU clock.
      - uid: host-thermal-throttle
        title: host-thermal-throttle
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'mac_cpu_speed_limit_percent'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 100'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: host
          component: thermal
          channel: infra
        annotations:
          summary: 'CPU thermal throttle at {{ printf "%.0f" $values.A.Value }}%'
          description: 'macOS has capped the CPU clock for 5m. Sustained throttle slows everything in the Colima VM.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: '% of max clock'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Fan stalled while CPU is hot.
      - uid: host-fan-stalled
        title: host-fan-stalled
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'min(mac_fan_rpm) > bool 0'
          - refId: T
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: T
              instant: true
              editorMode: code
              expr: 'mac_cpu_temp_celsius'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 1 && $T >= 60'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: host
          component: fan
          channel: infra
        annotations:
          summary: 'Fan stalled while CPU is hot'
          description: 'At least one fan reports 0 RPM while CPU temp ≥60°C for 5m.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'min RPM'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Root filesystem fill (80/92 thresholds).
      - uid: host-disk-warning
        title: host-disk-warning
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - node_filesystem_free_bytes{host="mac",mountpoint="/"} / node_filesystem_size_bytes{host="mac",mountpoint="/"}) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 80'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: host
          component: disk
          channel: infra
        annotations:
          summary: 'Host root disk {{ printf "%.0f" $values.A.Value }}% used'
          description: 'Mac host `/` filesystem above 80% for 10m. Plan cleanup; this is the disk Colima images live on.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'used%'
        isPaused: false

      - uid: host-disk-critical
        title: host-disk-critical
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - node_filesystem_free_bytes{host="mac",mountpoint="/"} / node_filesystem_size_bytes{host="mac",mountpoint="/"}) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 92'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: host
          component: disk
          channel: infra
        annotations:
          summary: 'Host root disk {{ printf "%.0f" $values.A.Value }}% used (critical)'
          description: 'Mac host `/` >92% full for 5m. Colima writes will start failing soon; free space immediately.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # SMART health = drive failing.
      - uid: host-smart-failing
        title: host-smart-failing
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'min by (device) (mac_smart_health)'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 1'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: host
          component: smart
          channel: infra
        annotations:
          summary: 'SMART failing on {{ $labels.device }}'
          description: 'smartctl reports {{ $labels.device }} as NOT PASSED. Back up data and replace drive ASAP.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'health'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # NVMe wear-out >80%.
      - uid: host-smart-wear-high
        title: host-smart-wear-high
        condition: B
        for: 30m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 1800, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'max by (device) (mac_smart_percent_used)'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 80'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: host
          component: smart
          channel: infra
        annotations:
          summary: 'SMART wear {{ printf "%.0f" $values.A.Value }}% on {{ $labels.device }}'
          description: 'NVMe `Percentage Used` >80% on {{ $labels.device }}. Plan replacement.'
          dashboard_url: 'https://grafana.int/d/host-overview/host'
          value_label: 'used %'
        isPaused: false
