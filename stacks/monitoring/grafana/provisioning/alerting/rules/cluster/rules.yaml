apiVersion: 1
groups:
  - orgId: 1
    name: cluster.homelab
    folder: Cluster
    interval: 1m
    rules:
      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-node-not-ready
        title: cluster-node-not-ready
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'max by(node) (kube_node_status_condition{condition="Ready",status="false"} == 1)'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 0'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: cluster
          component: node
          channel: cluster
        annotations:
          summary: 'Node {{ $labels.node }} is NotReady'
          description: 'Kubernetes reports node `{{ $labels.node }}` Ready=false for 2m. Workloads on this node are at risk.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=1'
          value_label: 'nodes'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-nothing-ready
        title: cluster-nothing-ready
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'sum(kube_pod_container_status_ready) / count(kube_pod_container_status_ready) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 10'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: cluster
          component: cluster
          channel: cluster
        annotations:
          summary: 'Cluster catastrophic: <10% of containers Ready'
          description: 'Ready-container ratio is {{ printf "%.0f" $values.A.Value }}% across the cluster. Almost nothing is running.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=3'
          value_label: 'ready%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-pod-crashloop
        title: cluster-pod-crashloop
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 900, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'max by(namespace,pod) (changes(kube_pod_container_status_restarts_total[15m]))'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A >= 3'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: cluster
          component: pod
          channel: cluster
        annotations:
          summary: 'Pod {{ $labels.namespace }}/{{ $labels.pod }} crashlooping'
          description: 'Container has restarted {{ $values.A.Value }} time(s) in the last 15m.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=6'
          value_label: 'restarts/15m'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-containers-not-ready
        title: cluster-containers-not-ready
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'sum by(namespace,pod) (kube_pod_container_status_ready == 0) unless on(namespace,pod) kube_pod_status_phase{phase="Succeeded"} == 1'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 0'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: cluster
          component: pod
          channel: cluster
        annotations:
          summary: 'Container(s) not ready in {{ $labels.namespace }}/{{ $labels.pod }}'
          description: '{{ $values.A.Value }} container(s) in pod `{{ $labels.namespace }}/{{ $labels.pod }}` have been not-Ready for 5m.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=4'
          value_label: 'containers'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-cpu-usage-warning
        title: cluster-cpu-usage-warning
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 50'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: cluster
          component: cpu
          channel: cluster
        annotations:
          summary: 'Cluster CPU usage {{ printf "%.0f" $values.A.Value }}% on {{ $labels.instance }}'
          description: 'CPU above warning threshold (50%) for 10m on `{{ $labels.instance }}`.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=8'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-cpu-usage-critical
        title: cluster-cpu-usage-critical
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 75'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: cluster
          component: cpu
          channel: cluster
        annotations:
          summary: 'Cluster CPU usage {{ printf "%.0f" $values.A.Value }}% on {{ $labels.instance }} (critical)'
          description: 'CPU above critical threshold (75%) for 5m on `{{ $labels.instance }}`.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=8'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-memory-usage-warning
        title: cluster-memory-usage-warning
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 50'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: cluster
          component: memory
          channel: cluster
        annotations:
          summary: 'Cluster RAM usage {{ printf "%.0f" $values.A.Value }}% on {{ $labels.instance }}'
          description: 'Memory above warning threshold (50%) for 10m on `{{ $labels.instance }}`.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=14'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-memory-usage-critical
        title: cluster-memory-usage-critical
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 75'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: cluster
          component: memory
          channel: cluster
        annotations:
          summary: 'Cluster RAM usage {{ printf "%.0f" $values.A.Value }}% on {{ $labels.instance }} (critical)'
          description: 'Memory above critical threshold (75%) for 5m on `{{ $labels.instance }}`.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=14'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Disk rules: only evaluate the node root filesystem ("/"), and skip
      # virtual/overlay/loopback fstypes. k3d nodes mount dozens of container
      # overlay paths (/etc/hostname, /k3d/images, /var/lib/cni, ...) that
      # do not represent real disk capacity — those would otherwise alert
      # spuriously on container-image storage.
      - uid: cluster-disk-usage-warning
        title: cluster-disk-usage-warning
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay|devtmpfs|squashfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay|devtmpfs|squashfs"}) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 50'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: cluster
          component: disk
          channel: cluster
        annotations:
          summary: 'Root disk {{ printf "%.0f" $values.A.Value }}% used on {{ $labels.instance }}'
          description: 'Root filesystem above warning threshold (50%) for 10m on `{{ $labels.instance }}`.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=16'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      - uid: cluster-disk-usage-critical
        title: cluster-disk-usage-critical
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay|devtmpfs|squashfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay|devtmpfs|squashfs"}) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 75'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: critical
          entity: cluster
          component: disk
          channel: cluster
        annotations:
          summary: 'Root disk {{ printf "%.0f" $values.A.Value }}% used on {{ $labels.instance }} (critical)'
          description: 'Root filesystem above critical threshold (75%) for 5m on `{{ $labels.instance }}`. Free space immediately.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=16'
          value_label: 'used%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Cluster dashboard has no dedicated disk-IO panel yet; points at the
      # Homelab overview which does.
      - uid: cluster-disk-io-spike
        title: cluster-disk-io-spike
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'max by(instance,device) (rate(node_disk_io_time_seconds_total[5m])) * 100'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A > 70'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: cluster
          component: disk-io
          channel: cluster
        annotations:
          summary: 'Disk {{ $labels.device }} busy {{ printf "%.0f" $values.A.Value }}% on {{ $labels.instance }}'
          description: 'Disk `{{ $labels.device }}` on `{{ $labels.instance }}` above 70% busy (5m avg) for 10m.'
          dashboard_url: 'https://grafana.int/d/homelab-overview/home-lab?viewPanel=12'
          value_label: 'busy%'
        isPaused: false

      # ─────────────────────────────────────────────────────────────────────
      # Generic scrape catch-all. Excludes exporters that have their own
      # dedicated *-exporter-down rules so we don't double-page.
      # (All exporters are scraped under one job `kubernetes-service-endpoints`
      # — exclusion has to be by `service` label, not `job`.)
      - uid: prometheus-target-down
        title: prometheus-target-down
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'up{service!~"mikrotik-exporter|adguard-exporter"}'
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: math
              expression: '$A < 1'
              datasource: {type: __expr__, uid: __expr__}
        labels:
          severity: warning
          entity: cluster
          component: exporter
          channel: cluster
        annotations:
          summary: 'Prometheus target down: {{ $labels.service }}/{{ $labels.instance }}'
          description: 'Scrape target `{{ $labels.instance }}` (service `{{ $labels.service }}`) has been down for 5m.'
          dashboard_url: 'https://grafana.int/d/cluster-overview/cluster-overview?viewPanel=1'
          value_label: 'up'
        isPaused: false
