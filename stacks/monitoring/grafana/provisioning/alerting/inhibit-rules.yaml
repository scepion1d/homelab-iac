apiVersion: 1
# Inhibit rules: silence a derivative alert while its source-of-truth fires.
# Cluster-specific entry (cluster-nothing-ready) removed in v2 — no k3d.
inhibitRules:
  # Generic: a critical alert silences a warning of the same entity+component.
  - orgId: 1
    sourceMatchers:
      - severity = critical
    targetMatchers:
      - severity = warning
    equal: [entity, component]

  # When the router exporter is dead, every other router-* alert is just
  # stale/missing data. Suppress them; the exporter-down alert is enough.
  - orgId: 1
    sourceMatchers:
      - alertname = router-mktxp-exporter-down
    targetMatchers:
      - entity = router
      - alertname != router-mktxp-exporter-down
    equal: [entity]

  # Same idea for AdGuard.
  - orgId: 1
    sourceMatchers:
      - alertname = adguard-exporter-down
    targetMatchers:
      - entity = adguard
      - alertname != adguard-exporter-down
    equal: [entity]

  # Same idea for Unbound.
  - orgId: 1
    sourceMatchers:
      - alertname = unbound-exporter-down
    targetMatchers:
      - entity = unbound
      - alertname != unbound-exporter-down
    equal: [entity]

  # Same idea for the mac host. When Prometheus can't reach node_exporter on
  # the Mac, every host-* signal is stale; the exporter-down alert alone
  # carries the page so we don't flood #infra with derivative failures.
  - orgId: 1
    sourceMatchers:
      - alertname = host-mac-exporter-down
    targetMatchers:
      - entity = host
      - alertname != host-mac-exporter-down
    equal: [entity]
