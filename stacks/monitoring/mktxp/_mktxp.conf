# mktxp daemon-wide config — carry-over from v1
# (cluster/apps/mikrotik-exporter/configmap.yaml `_mktxp.conf`).

[MKTXP]
    listen = '0.0.0.0:49090'
    socket_timeout = 5

    initial_delay_on_failure = 30
    max_delay_on_failure = 300
    delay_inc_div = 5

    bandwidth = False
    bandwidth_test_dns_server = 8.8.8.8
    bandwidth_test_interval = 600
    minimal_collect_interval = 5

    verbose_mode = False
    fetch_routers_in_parallel = False
    max_worker_threads = 5
    max_scrape_duration = 10
    total_max_scrape_duration = 30
    persistent_router_connection_pool = True
    persistent_dhcp_cache = True
    compact_default_conf_values = False
    prometheus_headers_deduplication = False

    # mktxp 1.2.17 added these for the /probe multi-target endpoint.
    # We don't use /probe but the keys still need to be present.
    probe_connection_pool = False
    probe_connection_pool_ttl = 300
    probe_connection_pool_max_size = 128

    # mktxp 1.2.17 also added this for the metrics HTTP server.
    http_server_threads = 5
