# mktxp per-router config.
# Credentials are spliced into the [mikrotik] section by
# stacks/monitoring/ansible/prepare.yml from .env (MIKROTIK_USER /
# MIKROTIK_PASSWORD). This file in the repo has placeholder values;
# prepare.yml writes the real values into the data_root copy that
# compose bind-mounts in.

[default]
    enabled = True
    module_only = False
    hostname = localhost
    port = 8728
    username = username
    password = password

    use_ssl = False
    no_ssl_certificate = False
    ssl_certificate_verify = False
    ssl_check_hostname = True
    ssl_ca_file = ""
    plaintext_login = True

    routerboard = False
    health = True
    installed_packages = True
    dhcp = True
    dhcp_lease = True

    connections = True
    connection_stats = False

    interface = True
    wireguard_peers = False
    bridge_vlan = False

    route = True
    pool = True
    firewall = True
    neighbor = True
    address_list = None
    dns = False

    poe = True
    monitor = True
    netwatch = True
    public_ip = True
    wireless = True
    wireless_clients = True
    capsman = True
    capsman_clients = True

    eoip = False
    gre = False
    ipip = False
    lte = False
    ipsec = False
    switch_port = False

[mikrotik]
    hostname = 192.168.10.1
    port = 8728
    use_ssl = False
    plaintext_login = True
    username = __MIKROTIK_USER__
    password = __MIKROTIK_PASSWORD__
