name: homelab-monitoring

# Monitoring stack: Prometheus + Grafana + MikroTik exporter.
# Targets:
#   - dns stack: adguard-exporter (:9618), unbound-exporter (:9167)
#   - host:     node-exporter (host.docker.internal:9100)
#   - router:   mikrotik-exporter sibling (:49090)
#   - (later)   home-assistant /api/prometheus (smart-home stack)

networks:
  homelab:
    name: ${NETWORK_NAME:-homelab}
    external: true
  internal:
    driver: bridge

volumes:
  prometheus-data:
    name: homelab-monitoring-prometheus
  grafana-data:
    name: homelab-monitoring-grafana

services:
  prometheus:
    # Latest 3.x track. Pinning to a real published tag matters more than
    # picking a specific patch — we read /-/ready as health, not version.
    image: prom/prometheus:v3.7.0
    container_name: homelab-monitoring-prometheus
    restart: unless-stopped
    networks: [homelab, internal]
    ports:
      - "0.0.0.0:${PROM_UI_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"        # POST /-/reload triggers reread
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      # HA bearer token rendered by ansible into the data dir, mounted
      # into the path prometheus.yml's credentials_file points at.
      - ${DATA_ROOT}/monitoring/prometheus/secrets:/etc/prometheus/secrets:ro
      - prometheus-data:/prometheus
    labels:
      homelab.caddy.host: "prometheus"
      homelab.caddy.port: "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    # Grafana 11.x — provisioning format aligned with v1.
    image: grafana/grafana:11.6.0
    container_name: homelab-monitoring-grafana
    restart: unless-stopped
    networks: [homelab, internal]
    ports:
      - "0.0.0.0:${GRAFANA_UI_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-polystat-panel"
      # Pin the "Home" page to the homelab overview dashboard.
      # `dashboards/homelab.json` is provisioned at the root (no folder),
      # so this path is stable across UI folder reorgs.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/homelab.json"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # contact-points.yaml is rendered by ansible (with Slack token spliced
      # in) into ${DATA_ROOT}/monitoring/grafana/provisioning/alerting/.
      # Override the read-only mount above so Grafana sees the real token.
      - ${DATA_ROOT}/monitoring/grafana/provisioning/alerting/contact-points.yaml:/etc/grafana/provisioning/alerting/contact-points.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    labels:
      homelab.caddy.host: "grafana"
      homelab.caddy.port: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mikrotik-exporter:
    image: ghcr.io/akpw/mktxp:1.2.17
    container_name: homelab-monitoring-mktxp
    restart: unless-stopped
    networks: [homelab, internal]
    command: ["mktxp", "--cfg-dir", "/etc/mktxp", "export"]
    volumes:
      - ./mktxp/_mktxp.conf:/etc/mktxp/_mktxp.conf:ro
      # Rendered by ansible (with MIKROTIK_USER/PASSWORD spliced into the
      # [mikrotik] section) into the data dir. The placeholder file in
      # the repo holds __MIKROTIK_USER__ / __MIKROTIK_PASSWORD__ markers
      # and is NOT mounted directly.
      - ${DATA_ROOT}/monitoring/mktxp/mktxp.conf:/etc/mktxp/mktxp.conf:ro
    labels:
      homelab.metrics.port: "49090"
      homelab.metrics.path: "/metrics"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 49090 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Per-container metrics (CPU, throttling, memory, network) for everything
  # running under the Colima Docker daemon. Reachable as `cadvisor:8080` by
  # prometheus (sibling on the internal bridge).
  #
  # On the internal-only bridge (NOT the shared `homelab` network) because
  # the container is privileged and binds docker.sock + the VM's rootfs.
  #
  # cgroup: host is required on cgroup v2 (Colima/Lima default). Without it
  # docker puts the container in its own cgroup namespace and cadvisor can
  # only see its own metrics. Verify with: docker inspect cadvisor --format
  # '{{.HostConfig.CgroupnsMode}}' (should print 'host').
  #
  # NO /var/lib/docker mount. Docker 29's new containerd-backed `overlayfs`
  # snapshotter (Colima default since ~mid-2025) replaces the legacy
  # `overlay2` graphdriver. cAdvisor v0.49 and earlier hard-code a
  # `/var/lib/docker/image/overlay2/layerdb/mounts/<id>/mount-id` lookup
  # that no longer exists, fails for every container, and silently emits
  # ZERO container metrics. v0.55.1+ no longer requires this mount when
  # using docker.sock — drop it entirely.
  #
  # Metric set is whitelisted to cpu/memory/network/oom_event to keep TSDB
  # cardinality low; that covers the panels we have today (Svc CPU, Exp CPU,
  # Svc Throttled, container_start_time_seconds for Dumper Uptime — base
  # metric, always emitted). Add to --enable_metrics when a new panel needs
  # disk/diskIO/sched/etc.
  #
  # `name=` label on cAdvisor v0.36+ is the docker container name without the
  # leading slash, so PromQL like {name="homelab-dns-adguard"} matches directly.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: homelab-monitoring-cadvisor
    restart: unless-stopped
    networks: [internal]
    privileged: true
    cgroup: host
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--store_container_labels=false"
      - "--whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service"
      - "--enable_metrics=cpu,memory,network,oom_event"
      - "--disable_root_cgroup_stats=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
