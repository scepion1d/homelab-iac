# Home Assistant Container.
#
# `network_mode: host` is mandatory:
#   - HomeKit Bridge advertises via mDNS (broadcast). Bridged Docker
#     networks block multicast on the host link.
#   - Apple TV (HomeKit hub) opens TCP back to HA on the announced port.
#     Host networking is the simplest way to make that path symmetric.
#
# Trade-off: ${NETWORK_NAME} from host/globals.yaml is bypassed for this
# app. Acceptable because HA doesn't need to reach other host apps over
# Docker DNS; it reaches cluster services via LAN ingress (*.int).
#
# Image tag: pinned to the current YYYY.M series. Home Assistant ships
# monthly; bump intentionally rather than tracking `stable`.
#
# Data layout:
#   ${APP_DATA}/config/        <- HA `/config` (configuration + state + storage)
#
# Re-deploying with a fresh data dir loses HomeKit pairing keys
# (.storage/homekit.*) and you'll need to re-pair every accessory.
services:
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:2026.5
    container_name: homelab-home-assistant
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-Europe/Warsaw}
    volumes:
      - ${APP_DATA}/config:/config
      - /etc/localtime:/etc/localtime:ro
    # Healthcheck probes the unauthenticated /manifest.json (HA serves it
    # to anyone — it's the PWA manifest). Earlier versions of this file
    # probed /api/ which requires a Bearer token; HA logged a stream of
    # "invalid authentication from 127.0.0.1" warnings and would
    # eventually IP-ban the loopback (then the healthcheck fails for
    # real, Docker restarts, repeat).
    # Tolerates a 60s cold start; HA's first boot does a lot of work.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/manifest.json"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
