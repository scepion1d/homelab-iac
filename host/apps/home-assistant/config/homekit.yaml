# HomeKit Bridge config.
# PIN: HA UI -> Settings -> Devices & Services -> HomeKit Bridge.
# advertise_ip pinned to Mac LAN IP (HA runs in Colima VM, autodetects wrong IP).
# mDNS bridged by bootstrap/services/mdns-reflector.py (VM -> Mac -> LAN).
- name: "Home Lab"
  port: 21063
  advertise_ip: 192.168.10.3
  mode: bridge

  filter:
    include_domains:
      - input_boolean
      - input_number
      - input_select
    # Uncomment as you add real devices:
    #   - light
    #   - switch
    #   - cover
    #   - climate
    #   - sensor
    #   - binary_sensor
    #   - media_player
    # exclude_entity_globs:
    #   - sensor.*_battery
    #   - sensor.*_signal_strength

