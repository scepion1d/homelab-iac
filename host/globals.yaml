# Host-side constants. Single source of truth for values that bootstrap
# scripts and host/apps/*/compose.yaml files need. Mirrors cluster/globals.yaml
# in spirit but consumed by bootstrap (yq), not Argo CD.
#
# What references each value:
#
#   hostIp       — bootstrap/lib.sh::regenerate_host_targets uses this as
#                  the address Prometheus (in-cluster) scrapes for any host
#                  app. Compose files reference it via `${HOST_IP}` env var
#                  that bootstrap exports.
#                  `auto` → detected via outbound interface; override with a
#                  literal IP if your LAN address isn't stable. On Colima
#                  setups where the cluster can't reach the host LAN IP,
#                  `host.docker.internal` is a working alternative.
#
#   dataRoot     — root directory on the host for ALL host-app persistent
#                  data. Each app gets its own `${dataRoot}/<app>/` subdir
#                  bind-mounted into the container. Tilde-expanded by
#                  bootstrap. Single tree so backup = `rsync ${dataRoot}`.
#
#   networkName  — Docker network all host apps attach to (unless they
#                  override with `network_mode: host` — e.g. Home Assistant
#                  for mDNS). Bootstrap creates the network lazily on first
#                  reconcile.
#
#   lanDomain    — MUST match cluster/globals.yaml::lanDomain. Kept
#                  duplicated rather than imported to avoid coupling
#                  bootstrap to cluster-manifest parsing. Bootstrap warns
#                  (but does not fail) on divergence.
hostIp: auto
dataRoot: ~/homelab-data
networkName: homelab
lanDomain: int
