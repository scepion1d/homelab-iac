---
- name: Include dependency tasks
  ansible.builtin.include_tasks:
    file: deps.yml
    apply:
      tags: [deps]
  tags: [deps]

- name: Include runtime tasks
  ansible.builtin.include_tasks:
    file: runtime.yml
    apply:
      tags: [runtime]
  tags: [runtime]

- name: Include services tasks
  ansible.builtin.include_tasks:
    file: services.yml
    apply:
      tags: [services]
  tags: [services]

