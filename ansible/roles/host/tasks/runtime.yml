---
# Ensure Colima VM is running with the correct config.

- name: Check Colima status
  ansible.builtin.command: colima status --profile {{ colima_profile }}
  register: colima_status
  changed_when: false
  failed_when: false

- name: Start Colima
  when: colima_status.rc != 0
  block:
    - name: Start Colima VM
      ansible.builtin.command: >
        colima start
        --profile {{ colima_profile }}
        --cpu {{ colima_cpu }}
        --memory {{ colima_memory }}
        --disk {{ colima_disk }}
        {{ '--network-address' if colima_network_address == 'true' else '' }}
      register: colima_start
      failed_when: false

    - name: Verify Colima came up
      ansible.builtin.command: colima status --profile {{ colima_profile }}
      register: colima_verify
      retries: 15
      delay: 4
      until: colima_verify.rc == 0

    - name: Notify Slack — Colima started
      ansible.builtin.include_tasks: ../../common/tasks/slack.yml
      vars:
        slack_notify_channel: "{{ slack_channels.infra }}"
        slack_notify_msg: "Colima VM started ({{ colima_cpu }} CPU, {{ colima_memory }}Gi RAM)"
        slack_notify_color: good

- name: Get Colima VM address
  ansible.builtin.shell: |
    colima status --profile {{ colima_profile }} 2>&1 | grep -oE 'address:\s+[0-9.]+' | awk '{print $2}'
  register: colima_address_raw
  changed_when: false

- name: Set VM address fact
  ansible.builtin.set_fact:
    colima_vm_ip: "{{ colima_address_raw.stdout | trim }}"

- name: Fix VM DNS (public resolvers when dnsmasq is masked)
  ansible.builtin.command: >
    colima ssh --profile {{ colima_profile }} --
    sudo sh -c 'printf "nameserver 1.1.1.1\nnameserver 9.9.9.9\noptions ndots:0\n" > /etc/resolv.conf'
  when: colima_vm_ip | length > 0
  changed_when: false

- name: Mask dnsmasq inside VM
  ansible.builtin.command: >
    colima ssh --profile {{ colima_profile }} --
    sudo systemctl mask dnsmasq
  changed_when: false
  failed_when: false

- name: Set DOCKER_HOST
  ansible.builtin.set_fact:
    docker_host: "unix://{{ homelab_home }}/.colima/{{ colima_profile }}/docker.sock"

- name: Wait for Docker daemon
  ansible.builtin.command: docker info
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  register: docker_info
  retries: 30
  delay: 2
  until: docker_info.rc == 0
  changed_when: false
