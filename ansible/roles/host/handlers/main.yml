---
# launchd reload pattern: `kickstart -k` only restarts the running process
# with the cmd-line launchd cached at bootstrap time, so plist changes are
# ignored. `bootout` (if loaded) + `enable` (clear disabled flag) +
# `bootstrap` re-reads the plist, and is idempotent against a fully
# unloaded service. `enable` is mandatory because bootout sometimes leaves
# the service in the persistent disabled list, causing the next bootstrap
# to fail with "Bootstrap failed: 5: Input/output error".
- name: restart-dns-proxy
  become: true
  ansible.builtin.shell: |
    plist=/Library/LaunchDaemons/com.homelab.dns-proxy.plist
    svc=system/com.homelab.dns-proxy
    launchctl bootout "$svc" 2>/dev/null || true
    launchctl enable "$svc"
    launchctl bootstrap system "$plist"
  listen: restart-dns-proxy

- name: notify-dns-proxy
  ansible.builtin.uri:
    url: https://slack.com/api/chat.postMessage
    method: POST
    headers:
      Authorization: "Bearer {{ slack_ansible_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      channel: "{{ slack_channels.network }}"
      attachments:
        - color: good
          text: "dns-proxy restarted ({{ lan_ip }}:53 → {{ colima_vm_ip }}:53)"
    status_code: [200]
  listen: restart-dns-proxy
  when: slack_ansible_token | default('') | length > 0
  ignore_errors: true
  no_log: true

