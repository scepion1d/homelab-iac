        - color: good
          text: "mDNS reflector restarted ({{ mdns_vm_vmnet_ip }} → {{ lan_ip }})"
    status_code: [200]
  listen: restart-mdns-reflector
  when: slack_ansible_token | default('') | length > 0
  ignore_errors: true
  no_log: true
