---
# Create cluster-side secrets from .env variables.

- name: Ensure dns namespace
  ansible.builtin.command: kubectl create namespace dns
  failed_when: false
  changed_when: false

- name: Ensure monitoring namespace
  ansible.builtin.command: kubectl create namespace monitoring
  failed_when: false
  changed_when: false

- name: Create grafana-admin secret
  ansible.builtin.shell: |
    kubectl -n monitoring create secret generic grafana-admin \
      --from-literal=admin-user=admin \
      --from-literal=admin-password='{{ grafana_admin_password }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  when: grafana_admin_password | length > 0
  no_log: true
  changed_when: false

- name: Create mikrotik-exporter-credentials secret
  ansible.builtin.shell: |
    kubectl -n monitoring create secret generic mikrotik-exporter-credentials \
      --from-literal=username='{{ mikrotik_user }}' \
      --from-literal=password='{{ mikrotik_password }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  when: mikrotik_user | length > 0 and mikrotik_password | length > 0
  no_log: true
  changed_when: false

- name: Create argocd-notifications-secret
  ansible.builtin.shell: |
    kubectl -n argocd create secret generic argocd-notifications-secret \
      --from-literal=slack-token='{{ lookup("env", "ARGOCD_SLACK_TOKEN") }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  when: lookup("env", "ARGOCD_SLACK_TOKEN") | length > 0
  no_log: true
  changed_when: false
