---
# Health checks and smoke tests.

- name: DNS smoke test
  ansible.builtin.command: dig @127.0.0.1 cloudflare.com +short +timeout=3
  register: dns_test
  changed_when: false
  failed_when: false

- name: Ingress smoke test — ArgoCD
  ansible.builtin.uri:
    url: https://argocd.int
    validate_certs: false
    timeout: 5
  register: argocd_test
  failed_when: false

- name: Set health facts
  ansible.builtin.set_fact:
    dns_healthy: "{{ dns_test.rc == 0 and dns_test.stdout | length > 0 }}"
    ingress_healthy: "{{ argocd_test.status | default(0) == 200 }}"

- name: Report health
  ansible.builtin.debug:
    msg: "DNS: {{ 'OK' if dns_healthy else 'FAIL' }} | Ingress: {{ 'OK' if ingress_healthy else 'FAIL' }}"
