---
# Ensure k3d cluster exists and is healthy. Auto-recover if broken.

- name: Pre-create PVC directory on VM
  ansible.builtin.command: >
    colima ssh --profile {{ colima_profile }} --
    sudo mkdir -p /var/lib/homelab-pvcs
  changed_when: false
  failed_when: false

- name: Check if k3d cluster exists
  ansible.builtin.command: k3d cluster list --no-headers
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  register: k3d_list
  changed_when: false
  failed_when: false

- name: Check for running k3d nodes
  ansible.builtin.shell: |
    docker ps --format '{{ '{{' }}.Names{{ '}}' }}' | grep -cE '^k3d-{{ k3d_cluster_name }}-(server|agent)' || echo 0
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  register: k3d_running_nodes
  changed_when: false

- name: Set cluster state facts
  ansible.builtin.set_fact:
    cluster_exists: "{{ k3d_cluster_name in (k3d_list.stdout | default('')) }}"
    cluster_has_nodes: "{{ (k3d_running_nodes.stdout | trim | int) > 0 }}"

- name: Delete stale cluster (exists but no running nodes)
  ansible.builtin.command: k3d cluster delete {{ k3d_cluster_name }}
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  when: cluster_exists and not cluster_has_nodes
  register: cluster_deleted

- name: Create k3d cluster
  ansible.builtin.command: k3d cluster create --config {{ k3d_config }}
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  when: not cluster_exists or (cluster_deleted is defined and cluster_deleted is changed)
  register: cluster_created

- name: Start k3d cluster (if exists but stopped)
  ansible.builtin.command: k3d cluster start {{ k3d_cluster_name }}
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  when: cluster_exists and cluster_has_nodes and (cluster_created is not defined or cluster_created is skipped)
  failed_when: false

- name: Refresh kubeconfig
  ansible.builtin.command: >
    k3d kubeconfig merge {{ k3d_cluster_name }}
    --kubeconfig-merge-default --kubeconfig-switch-context
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  changed_when: false

- name: Wait for k3d API server
  ansible.builtin.command: kubectl get nodes
  register: k3d_api
  retries: 30
  delay: 5
  until: k3d_api.rc == 0
  changed_when: false

- name: Patch k3d node DNS (public resolvers)
  ansible.builtin.shell: |
    for n in $(docker ps --format '{{ '{{' }}.Names{{ '}}' }}' | grep -E '^k3d-{{ k3d_cluster_name }}-(server|agent)'); do
      docker exec "$n" sh -c 'printf "nameserver 1.1.1.1\nnameserver 9.9.9.9\noptions ndots:0\n" > /etc/resolv.conf'
    done
  environment:
    DOCKER_HOST: "{{ docker_host }}"
  changed_when: false

- name: Notify Slack — cluster created
  ansible.builtin.include_tasks: ../../common/tasks/slack.yml
  vars:
    slack_notify_channel: "{{ slack_channels.infra }}"
    slack_notify_msg: "k3d cluster '{{ k3d_cluster_name }}' created from scratch"
    slack_notify_color: warning
  when:
    - cluster_created is defined
    - cluster_created is changed
