---
# v2 graceful stop — invoked by the shutdown-hook LaunchDaemon at
# system shutdown, or run manually.
#
#   set -a; source .env; set +a
#   ansible-playbook ansible/stop.yml
- name: Stop homelab (v2)
  hosts: localhost
  environment:
    PATH: "/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin"
    HOME: "{{ homelab_home }}"

  vars:
    stacks_enabled:
      - smart-home   # reverse order from reconcile — apps first, infra last
      - monitoring
      - dns

  pre_tasks:
    - name: Set DOCKER_HOST
      ansible.builtin.set_fact:
        docker_host: "unix://{{ homelab_home }}/.colima/{{ colima_profile }}/docker.sock"

  tasks:
    - name: Notify Slack — shutting down
      ansible.builtin.include_tasks: roles/common/tasks/slack.yml
      vars:
        slack_notify_channel: "{{ slack_channels.infra }}"
        slack_notify_msg: "Homelab shutting down gracefully"
        slack_notify_color: warning
      when: slack_ansible_token | length > 0

    - name: Compose down each stack
      ansible.builtin.include_role:
        name: compose-stack
      vars:
        stack: "{{ item }}"
        stack_action: down
      loop: "{{ stacks_enabled }}"
      failed_when: false

    - name: Stop Colima
      ansible.builtin.command: colima stop --profile {{ colima_profile }}
      failed_when: false

    - name: Notify Slack — stopped
      ansible.builtin.include_tasks: roles/common/tasks/slack.yml
      vars:
        slack_notify_channel: "{{ slack_channels.infra }}"
        slack_notify_msg: "Homelab stopped cleanly"
        slack_notify_color: good
      when: slack_ansible_token | length > 0
